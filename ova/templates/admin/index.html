{% extends "admin/index.html" %}
{% load i18n %}

{% block content %}
<div style="margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
    <a href="{% url 'admin:analytics-dashboard' %}" class="button" style="display: inline-block; padding: 10px 20px; background: var(--primary); color: var(--primary-fg); text-decoration: none; border-radius: 4px; font-weight: bold;">
        View Analytics Dashboard
    </a>
    <a href="{% url 'admin:run-migrations' %}" class="button" style="display: inline-block; padding: 10px 20px; background: var(--primary); color: var(--primary-fg); text-decoration: none; border-radius: 4px; font-weight: bold;">
        Run Migrations
    </a>
</div>
{{ block.super }}
{% endblock %}
